basePath: /ih/mobile_central_2_0_0
definitions:
  dto.LoginDto:
    properties:
      fromAdmin:
        default: false
        type: boolean
      fromBiometric:
        default: 0
        type: integer
      machineId:
        type: string
      password:
        type: string
      playerId:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  model.ApplicationUser:
    properties:
      address:
        type: string
      address1:
        type: string
      address2:
        type: string
      address3:
        type: string
      branch:
        type: string
      cityState:
        type: string
      contactNumber:
        type: string
      country:
        type: string
      dateLoggedIn:
        type: string
      dob:
        type: string
      docNoSignUp:
        type: string
      email:
        type: string
      firstName:
        type: string
      firstTimeBiometric:
        type: boolean
      firstTimeLogin:
        type: boolean
      fullName:
        type: string
      fullNameSignUp:
        type: string
      inactive:
        type: string
      isGoldenPearl:
        type: string
      isKidsExplorer:
        type: string
      isLoggedIn:
        type: integer
      lastName:
        type: string
      machineId:
        type: string
      masterPrn:
        type: string
      middleName:
        type: string
      nationality:
        type: string
      passport:
        type: string
      playerId:
        type: string
      postalCode:
