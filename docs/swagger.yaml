      role:
        type: string
      sessionId:
        type: string
      sex:
        type: string
      signInType:
        type: integer
      title:
        type: string
      user_id:
        type: integer
      userBranches:
        items:
          $ref: '#/definitions/model.AssignBranch'
        type: array
      username:
        type: string
      verificationCode:
        type: string
    type: object
  model.AssignBranch:
    properties:
      adminId:
        type: integer
      assignBranchId:
        type: integer
      branch:
        $ref: '#/definitions/model.Branch'
      branchId:
        type: integer
      prn:
        type: string
